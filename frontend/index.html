<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Alejandro Caraballo · Backend Developer</title>
    <meta name="description" content="Backend Developer focused on Python, FastAPI, Django and scalable systems." />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #app { margin: 0; padding: 0; min-height: 100%; }
      body { background: #fff; }
      html.dark body { background: #09090b; } /* zinc-950 */
    </style>
    <script>
      // Apply theme before render to avoid flash
      const stored = localStorage.getItem('theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
